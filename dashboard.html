<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Dashboard | Uday Singh</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #FDFCFB; 
            --text: #232F3E; 
            --accent: #A68966; 
            --white: #ffffff;
        }
        
        body, html { 
            margin: 0; 
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            overflow: hidden; /* Screen shake rokne ke liye */
        }

        /* Premium Navigation Bar */
        .nav-header { 
            height: 60px;
            padding: 0 40px; 
            background: rgba(255, 255, 255, 0.98); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: relative;
            z-index: 1000;
        }

        .back-btn { 
            text-decoration: none; 
            color: var(--text); 
            font-weight: 500; 
            font-size: 0.8rem; 
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid #eee;
            padding: 8px 15px;
            border-radius: 5px;
        }

        .back-btn:hover { border-color: var(--accent); color: var(--accent); }

        .dashboard-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--text);
        }

        /* Project Info Bar */
        .info-bar {
            background: var(--white);
            padding: 10px 40px;
            border-bottom: 1px solid rgba(166,137,102,0.1);
            display: flex;
            justify-content: flex-start;
            gap: 40px;
        }

        .metric { display: flex; flex-direction: column; }
        .metric span.label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); font-weight: 600; }
        .metric span.value { font-size: 0.9rem; font-weight: 500; color: var(--text); }

        /* Dashboard Container - Full Height Fix */
        .iframe-wrapper {
            width: 100%;
            height: calc(100vh - 115px); /* Header aur Info bar minus kiya */
            background: #fff;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Loading Screen */
        .loader-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: -1;
        }

        .loader-text {
            font-size: 0.85rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        @media (max-width: 600px) {
            .nav-header { padding: 0 15px; }
            .info-bar { display: none; } /* Mobile par space bachane ke liye */
            .iframe-wrapper { height: calc(100vh - 60px); }
        }
    </style>
</head>
<body>

    <header class="nav-header">
        <a href="index.html" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Home
        </a>
        <div class="dashboard-title">World Bank Data Analytics</div>
        <div style="width: 100px;" class="desktop-only"></div> 
    </header>

    <div class="info-bar">
        <div class="metric">
            <span class="label">Analysis</span>
            <span class="value">World Development Indicators</span>
        </div>
        <div class="metric">
            <span class="label">Tech Stack</span>
            <span class="value">Python • Plotly • Finance Data</span>
        </div>
        <div class="metric">
            <span class="label">Interaction</span>
            <span class="value" style="color: #27ae60;">● Fully Interactive</span>
        </div>
    </div>

    <div class="iframe-wrapper">
        <div class="loader-container">
            <div class="loader-text">Loading Interactive Charts...</div>
        </div>
        <iframe src="https://udaysingh8.github.io/portfolio/Dashboard_worldbsnk.html"></iframe>
    </div>

</body>
</html>
