<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certifications | Uday Singh</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #FDFCFB; 
            --text: #232F3E; 
            --accent: #A68966; 
            --white: #ffffff;
        }
        
        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            line-height: 1.6;
        }

        /* Navigation */
        .nav-header { 
            padding: 20px 40px; 
            background: var(--white); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .back-btn { 
            text-decoration: none; color: var(--text); font-weight: 500; 
            font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;
            border: 1px solid #eee; padding: 8px 15px; border-radius: 5px; transition: 0.3s;
        }
        .back-btn:hover { border-color: var(--accent); color: var(--accent); }

        .container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; }

        header { text-align: center; margin-bottom: 60px; }
        header h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin: 0; }
        header p { color: var(--accent); letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; margin-top: 10px; }

        /* Certificate Grid */
        .cert-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 40px; 
        }

        .cert-card { 
            background: var(--white); 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: 0.4s;
            border: 1px solid rgba(166,137,102,0.1);
        }

        .cert-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        .cert-img { 
            width: 100%; 
            height: 220px; 
            object-fit: cover; 
            border-bottom: 1px solid #eee;
            background: #f9f9f9;
        }

        .cert-info { padding: 25px; text-align: center; }
        .cert-title { font-weight: 600; font-size: 1.1rem; margin-bottom: 10px; color: #121212; }
        .cert-desc { font-size: 0.9rem; color: #666; font-style: italic; }

        footer { text-align: center; padding: 60px 0; opacity: 0.4; font-size: 0.8rem; }

        @media (max-width: 600px) {
            header h1 { font-size: 2.2rem; }
            .nav-header { padding: 15px 20px; }
        }
    </style>
</head>
<body>

    <nav class="nav-header">
        <a href="index.html" class="back-btn">← Home</a>
        <div style="font-family: 'Playfair Display'; font-weight: 700;">Uday Singh</div>
    </nav>

    <div class="container">
        <header>
            <p>Professional Credentials</p>
            <h1>My Certifications</h1>
        </header>

        <div class="cert-grid">
            
            <div class="cert-card">
                <img src="YOUR_IMAGE_LINK_1" alt="Certificate" class="cert-img">
                <div class="cert-info">
                    <div class="cert-title">Certificate Name 1</div>
                    <div class="cert-desc">Radhe Radhe</div>
                </div>
            </div>

            <div class="cert-card">
                <img src="YOUR_IMAGE_LINK_2" alt="Certificate" class="cert-img">
                <div class="cert-info">
                    <div class="cert-title">Certificate Name 2</div>
                    <div class="cert-desc">Radhe Radhe</div>
                </div>
            </div>

            <div class="cert-card">
                <img src="YOUR_IMAGE_LINK_3" alt="Certificate" class="cert-img">
                <div class="cert-info">
                    <div class="cert-title">Certificate Name 3</div>
                    <div class="cert-desc">Radhe Radhe</div>
                </div>
            </div>

            <div class="cert-card">
                <img src="YOUR_IMAGE_LINK_4" alt="Certificate" class="cert-img">
                <div class="cert-info">
                    <div class="cert-title">Certificate Name 4</div>
                    <div class="cert-desc">Radhe Radhe</div>
                </div>
            </div>

            </div>

        <footer>
            &copy; 2026 Uday Singh • Digital Portfolio
        </footer>
    </div>

</body>
</html>
