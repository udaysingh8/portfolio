<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uday Singh | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F9F7F2; --text: #2C3E50; --accent: #A68966; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; padding: 60px 20px; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 10px; }
        .subtitle { font-size: 1rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; }
        .intro-box { background: var(--white); padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .btn { display: inline-block; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: 600; margin: 10px; border: 2px solid var(--accent); transition: 0.3s; }
        .btn-work { background: var(--accent); color: var(--white); }
        .btn-cert { color: var(--accent); }
        .dashboard-img { width: 100%; border-radius: 10px; margin-top: 40px; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <p class="subtitle">B.Com Graduate • Data Analyst</p>
        <h1>Uday Singh</h1>
        <div class="intro-box">
            <p>I specialize in <strong>Corporate Finance</strong> and <strong>Data Analytics</strong>. I build dashboards that turn complex data into business insights.</p>
            <a href="#work" class="btn btn-work">View Dashboard</a>
            <a href="YOUR_DRIVE_LINK" class="btn btn-cert">Certificates</a>
        </div>
        <div id="work">
            <h2 style="margin-top:50px;">Featured Business Dashboard</h2>
            <img src="dashboard.png" alt="Dashboard" class="dashboard-img">
        </div>
        <footer style="margin-top:50px; opacity:0.7;">uday797112singh@gmail.com | Nangloi, Delhi</footer>
    </div>
</body>
</html>
